<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🌙 深夜小站 · 每日纪念</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0f17;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
    }

    .app {
      max-width: 500px;
      width: 100%;
      background: #131c29;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid #2d3d55;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
    }

    /* 头部 */
    .header {
      padding: 22px 18px 12px;
      background: linear-gradient(145deg, #1a2332, #0f1722);
      border-bottom: 1px solid #273546;
    }
    .header h1 {
      font-size: 1.6rem;
      color: #e1ecff;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .subtitle {
      color: #8aa0c0;
      font-size: 0.85rem;
      margin-top: 6px;
      font-style: italic;
    }

    /* 日期导航 */
    .date-nav {
      padding: 16px 12px;
      background: #0e1622;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1f2d40;
    }
    .date-nav button {
      background: #1e2a3c;
      border: 1px solid #354a65;
      color: #bcd2ff;
      font-size: 1.2rem;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .date-nav button:active {
      background: #2e4260;
      transform: scale(0.95);
    }
    #currentDateDisplay {
      color: #eef5ff;
      font-size: 1.1rem;
      font-weight: 500;
      background: #1b2537;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #364e6e;
      text-align: center;
      min-width: 130px;
    }

    /* 内容卡片 */
    .content-area {
      padding: 18px 14px 24px;
      background: #111924;
      min-height: 360px;
    }
    .story-card {
      background: #19222f;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid #2e4058;
      margin-bottom: 16px;
      color: #d7e4fa;
      line-height: 1.6;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .no-content {
      text-align: center;
      color: #6b84a8;
      padding: 40px 10px;
      font-style: italic;
    }

    .music-card {
      background: #15202e;
      border-radius: 22px;
      padding: 16px;
      border: 1px solid #2c4463;
      margin-top: 4px;
    }
    .music-title {
      color: #cadcff;
      font-size: 0.9rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .music-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .music-controls button {
      background: #293e5a;
      border: none;
      color: white;
      font-size: 1.2rem;
      width: 46px;
      height: 46px;
      border-radius: 46px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #4a6c93;
      -webkit-tap-highlight-color: transparent;
    }
    .music-controls button:active {
      background: #3d5b80;
    }
    .now-playing {
      color: #9cb7df;
      font-size: 0.8rem;
      margin-left: 6px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .audio-hint {
      margin-top: 12px;
      font-size: 0.7rem;
      color: #f0b37b;
      text-align: center;
    }
    .audio-unlock-btn {
      background: none;
      border: 1px dashed #f0b37b;
      color: #f5d5b3;
      padding: 5px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      margin-left: 10px;
      cursor: pointer;
    }

    .footer-note {
      text-align: center;
      color: #405574;
      font-size: 0.7rem;
      padding: 10px;
      border-top: 1px solid #1a2738;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🐭 米老鼠的深夜树洞</h1>
    <div class="subtitle">每天一个故事，一首歌，陪你入睡</div>
  </div>

  <!-- 日期选择器 -->
  <div class="date-nav">
    <button id="prevDayBtn" title="前一天">←</button>
    <span id="currentDateDisplay"></span>
    <button id="nextDayBtn" title="后一天">→</button>
  </div>

  <!-- 内容展示区 -->
  <div class="content-area" id="contentArea">
    <!-- 动态渲染 -->
  </div>

  <div class="footer-note">
    ⏤ 每一天，都为你存在 ⏤
  </div>
</div>

<script>
  (function() {
    // =============================================
    // 🌟 每日内容配置区（你只需要修改这里）
    // =============================================
    // 格式：键为日期 "YYYY-MM-DD"，值包含 story 和音乐信息
    const DAILY_CONTENT = {
       "2026-05-01": {
         story: "在一个宁静的小镇上，住着一只名叫布丁的小猫。它和别的小猫不一样，特别喜欢下雨。下雨天，当其他动物都躲在家里时，布丁却会兴奋地冲进雨里，在水坑里欢快地跳跃。它的主人艾米很担心它会着凉，但看着布丁快乐的样子，她也忍不住放下雨伞，和它一起在雨中玩耍。布丁觉得，下雨时世界会变得不一样。雨滴打在树叶上、水坑里的声音，像一首美妙的音乐，空气中也充满了清新的味道。渐渐地，小镇上的动物们都喜欢上了下雨天，因为布丁让他们发现了雨中的快乐。春天，它在雨中看花绽放；夏天，它在雷雨中追逐落叶；秋天，它在细雨里寻找蘑菇。布丁用它的特别爱好，给小镇带来了四季不同的惊喜和生机。",
         music: "20260501.mp3",
         musicTitle: "🐦海鸥"
       },
       "2026-04-29": {
         story: "城市东边有条老巷子，巷子尽头有家没有招牌的旧书店。店里住着一只胖乎乎的三花猫，没人知道它多大了。每天晚上九点过后，三花猫会准时跳上窗边的旧藤椅打盹。有个穿米色风衣的姑娘，总在周四晚上来，她不买书，只是坐在靠窗的小板凳上翻看诗集。三花猫慢慢习惯了她的存在。后来，姑娘会带鱼干给它吃，它就蹭蹭她的手心，跳上她的膝盖。老周在柜台后面拨着算盘，珠子碰撞的声音混在窗外的风声里，一切都那么安静而温暖。有一天，姑娘在店里待到很晚，对猫说：“你知道吗，有时候我觉得，活着挺累的。”猫没睁眼，只是把脑袋往她手心里蹭了蹭。姑娘的眼眶有些发热，她知道，在这家书店里，她找到了一个可以卸下所有防备的角落。后来她还是会去，春天，夏天，秋天，又一个冬天。三花猫越来越老，最后在那把藤椅上安详地离开了。姑娘还是会去那家店，坐在靠窗的小板凳上。藤椅还是那把藤椅，只是上面没有猫了。但有时候，特别是在月亮很亮的晚上，她会觉得有什么东西轻轻跳上她的膝盖，盘成一个圆。",
         music: "NDMZ.mp3",
         musicTitle: "🍬你的名字"
       },
      "2026-04-28": {
         story: "很久很久以前，在一个被晨雾环绕的宁静山谷，里面生活着一个小村庄，因康乃馨而闻名，这里的康乃馨不同寻常，它们拥有着一种神奇的力量，每天清晨无论风雨，都会如期绽放，传说，这里从前只是一个普普通通的小村庄，直到有一天，一位仙子降临，见到了村民每日的辛勤劳作，便施法让这里的康乃馨每日盛开，赐予了这片土地特殊的祝福，有一天一个迷了路的外地人无意间看到了这美丽的花海，便询问着本地的地名，村民们猛然想起来并没有取名，因为有些每天盛开的康乃馨，后来当地村民取了一个好听的名字就叫：天天开馨（天天开心）",
         music: "20260428.mp3",
         musicTitle: "🌏不属于地球上的"
      },
     "2026-04-27": {
        story: "蠢猫与蠢人\n\n少年坐在铺子里，夕阳的余晖下，一声猫叫传来。\n\n你这只抓不住鱼的蠢猫。\n\n少年回身,从案板上取了条鱼,扔了过去。\n\n猫叼着鱼跑远了。\n\n风暴突然间席卷了海岸。因无法出海，少年的生意越来越差，最后甚至连饭都吃不上了。\n\n喵。\n\n我没东西给你了。少年苦笑。\n\n猫从街角叼来硕大的麻袋，一抖，无数鱼干落在地上，堆成小山。\n\n你这个抓不住鱼的蠢人。",
        music: "QYQX.mp3",
        musicTitle: "🐱蠢人蠢猫"
      },
      "2026-04-26": {
        story: "日有小暖，岁有小安。\n\n何其有幸，年岁并进。管它几岁，开心万岁！🍻",
        music: "happy birthday.mp3",  // 音乐文件名（放在同一文件夹下）
        musicTitle: "🎵 生日快乐"
      },
      "2026-04-25": {
        story: "今天下了一场小雨，空气里有泥土的味道。\n\n我记得和你说过，最喜欢雨天睡觉。晚安。",
        music: "nightmusic.mp3",
        musicTitle: "🎧 雨天的诗"
      },
      "2026-04-24": {
        story: "工作有点累，但想到能给你写点什么，就觉得一切都值得。\n\n你要加油，我也是。",
        music: "",  // 这天可以没有音乐
        musicTitle: ""
      },
      // 👇 你可以继续添加更多日期，按相同格式
      // "2026-04-23": {
      //   story: "...",
      //   music: "filename.mp3",
      //   musicTitle: "歌名"
      // }
    };

    // =============================================
    // 以下为程序逻辑，无需修改
    // =============================================
    const dateNav = {
      prev: document.getElementById('prevDayBtn'),
      next: document.getElementById('nextDayBtn'),
      display: document.getElementById('currentDateDisplay')
    };
    const contentArea = document.getElementById('contentArea');

    let currentDateStr = ''; // 当前显示的日期 YYYY-MM-DD
    let currentAudio = null; // 当前音频对象

    // 获取所有有内容的日期，按时间排序
    const availableDates = Object.keys(DAILY_CONTENT).sort();

    // 如果没有任何内容，显示提示
    if (availableDates.length === 0) {
      contentArea.innerHTML = `<div class="no-content">✨ 还没有内容，快开始记录吧</div>`;
      dateNav.display.textContent = '---';
    } else {
      // 默认显示最新日期
      currentDateStr = availableDates[availableDates.length - 1];
      renderDate(currentDateStr);
    }

    // 切换日期事件
    dateNav.prev.addEventListener('click', () => {
      const idx = availableDates.indexOf(currentDateStr);
      if (idx > 0) {
        stopCurrentAudio();
        currentDateStr = availableDates[idx - 1];
        renderDate(currentDateStr);
      }
    });
    dateNav.next.addEventListener('click', () => {
      const idx = availableDates.indexOf(currentDateStr);
      if (idx < availableDates.length - 1) {
        stopCurrentAudio();
        currentDateStr = availableDates[idx + 1];
        renderDate(currentDateStr);
      }
    });

    // 停止当前播放
    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
    }

    // 渲染指定日期的内容
    function renderDate(dateStr) {
      dateNav.display.textContent = dateStr;
      const data = DAILY_CONTENT[dateStr] || {};
      const story = data.story || '';
      const music = data.music || '';
      const musicTitle = data.musicTitle || '';

      let html = '';
      
      // 故事区
      if (story) {
        html += `<div class="story-card">${escapeHtml(story)}</div>`;
      } else {
        html += `<div class="story-card" style="color:#5c6e88;">（这一天没有故事，只有晚安）</div>`;
      }

      // 音乐区
      if (music) {
        html += `
          <div class="music-card" id="musicCard">
            <div class="music-title">${escapeHtml(musicTitle || '🎵 今日歌曲')}</div>
            <div class="music-controls">
              <button id="playToggleBtn" title="播放/暂停">▶️</button>
              <span class="now-playing" id="nowPlayingLabel">点击播放</span>
            </div>
            <div class="audio-hint">
              <span>若无法播放，请先解锁</span>
              <button class="audio-unlock-btn" id="unlockBtn">🔓 解锁音频</button>
            </div>
          </div>`;
      }

      contentArea.innerHTML = html;

      // 绑定音频事件
      if (music) {
        bindAudioControls(music, musicTitle);
      }
    }

    // 音频控制逻辑
    function bindAudioControls(src, title) {
      const playBtn = document.getElementById('playToggleBtn');
      const nowLabel = document.getElementById('nowPlayingLabel');
      const unlockBtn = document.getElementById('unlockBtn');
      let audio = null;

      // 解锁音频上下文（解决浏览器自动播放限制）
      function unlockAudioContext() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        // 播放一点静音来激活
        const buffer = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start(0);
        nowLabel.textContent = '已解锁，点击播放';
      }

      // 创建或获取音频对象
      function getAudio() {
        if (audio) return audio;
        audio = new Audio(src);
        audio.onended = () => {
          playBtn.textContent = '▶️';
          nowLabel.textContent = '播放完毕';
          stopCurrentAudio();
          audio = null;
        };
        audio.onerror = () => {
          nowLabel.textContent = '音频加载失败，检查文件';
          playBtn.textContent = '▶️';
          stopCurrentAudio();
          audio = null;
        };
        return audio;
      }

      // 播放/暂停
      playBtn.addEventListener('click', async () => {
        const aud = getAudio();
        if (currentAudio && currentAudio !== aud) {
          stopCurrentAudio();
          playBtn.textContent = '▶️';
        }
        if (aud.paused) {
          try {
            await aud.play();
            currentAudio = aud;
            playBtn.textContent = '⏸️';
            nowLabel.textContent = '正在播放...';
          } catch (err) {
            nowLabel.textContent = '播放被阻止，请先解锁';
            playBtn.textContent = '▶️';
          }
        } else {
          aud.pause();
          playBtn.textContent = '▶️';
          nowLabel.textContent = '已暂停';
        }
      });

      // 解锁按钮
      unlockBtn.addEventListener('click', () => {
        unlockAudioContext();
        nowLabel.textContent = '已解锁，点击播放按钮';
      });

      // 页面加载时自动尝试解锁（不强制）
      unlockAudioContext();
    }

    // 简单的转义函数
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  })();
</script>
</body>
</html>
